name: ML Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Pull data from S3
      run: |
        dvc pull

    - name: Train model
      run: |
        python src/train.py

    - name: Upload metrics and model
      uses: actions/upload-artifact@v4
      with:
        name: model-artifacts
        path: |
          metrics.json
          model.pkl

    - name: Check performance and Build/Push Docker image
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: |
        # In a real scenario, we'd compare metrics here
        # For this lab, we always build and push if on main
        echo "R2 score check..."
        R2=$(python -c "import json; print(json.load(open('metrics.json'))['r2'])")
        echo "R2 score is $R2"
        
        if [ "$(echo "$R2 > 0.5" | bc -l)" -eq 1 ]; then
          echo "Performance is acceptable. Building Docker image..."
          docker build -t $DOCKER_USERNAME/california-housing-app:latest .
          echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
          docker push $DOCKER_USERNAME/california-housing-app:latest
        else
          echo "Performance is below threshold. Skipping Docker push."
        fi

    - name: Add Job Summary
      run: |
        echo "## Model Training Results" >> $GITHUB_STEP_SUMMARY
        echo "* **Dataset Size**: $(python -c "import json; print(json.load(open('metrics.json'))['sample_size'])")" >> $GITHUB_STEP_SUMMARY
        echo "* **RMSE**: $(python -c "import json; print(json.load(open('metrics.json'))['rmse'])")" >> $GITHUB_STEP_SUMMARY
        echo "* **R²**: $(python -c "import json; print(json.load(open('metrics.json'))['r2'])")" >> $GITHUB_STEP_SUMMARY
